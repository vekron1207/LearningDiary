];

const THEME={
info:{bg:'var(--color-background-info)',fg:'var(--color-text-info)',bar:'#378ADD'},
success:{bg:'var(--color-background-success)',fg:'var(--color-text-success)',bar:'#639922'},
warning:{bg:'var(--color-background-warning)',fg:'var(--color-text-warning)',bar:'#BA7517'},
danger:{bg:'var(--color-background-danger)',fg:'var(--color-text-danger)',bar:'#E24B4A'},
};
const DIFF={
easy:{bg:'var(--color-background-success)',fg:'var(--color-text-success)'},
medium:{bg:'var(--color-background-warning)',fg:'var(--color-text-warning)'},
hard:{bg:'var(--color-background-danger)',fg:'var(--color-text-danger)'},
};

let state={checks:{},tab:'proj',open:{},loaded:false};

async function loadChecks(){
try{
const r=await window.storage.get('lrn-diary-v1');
if(r&&r.value)state.checks=JSON.parse(r.value);
}catch(e){}
state.loaded=true;
render();
}

async function saveChecks(){
try{await window.storage.set('lrn-diary-v1',JSON.stringify(state.checks));}catch(e){}
}

function toggleCheck(id){
state.checks[id]=!state.checks[id];
saveChecks();
render();
}
function setTab(id){state.tab=id;render();}
function toggleSection(id){state.open[id]=!state.open[id];render();}
function toggleAllSections(phase,expand){
phase.sections.forEach(s=>{state.open[s.id]=expand;});
render();
}

function el(tag,attrs,children){
const e=document.createElement(tag);
if(attrs)Object.entries(attrs).forEach(([k,v])=>{
if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
else if(k==='onClick')e.addEventListener('click',v);
else if(k==='onChange')e.addEventListener('change',v);
else if(k==='href'){e.href=v;}
else if(k==='target'){e.target=v;}
else if(k==='rel'){e.rel=v;}
else if(k==='type'){e.type=v;}
else if(k==='checked'){e.checked=v;}
else e.setAttribute(k,v);
});
if(children){
(Array.isArray(children)?children:[children]).forEach(c=>{
if(c==null||c===false)return;
e.appendChild(typeof c==='string'?document.createTextNode(c):c);
});
}
return e;
}

function makeIcon(cls,size){
const i=document.createElement('i');
i.className='ti '+cls;
i.style.fontSize=(size||16)+'px';
i.setAttribute('aria-hidden','true');
return i;
}

function render(){
const root=document.getElementById('root');
root.innerHTML='';

const allItems=[...PHASES.flatMap(p=>p.sections.flatMap(s=>s.items)),...RESOURCES];
const total=allItems.length;
const done=allItems.filter(i=>state.checks[i.id]).length;
const pct=total?Math.round(done/total*100):0;

// Header
const hdr=el('div',{style:{marginBottom:'1.5rem'}});
const hdrRow=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:'8px'}});
hdrRow.appendChild(el('h1',{style:{fontSize:'20px',fontWeight:'500',color:'var(--color-text-primary)'}},'Learning Diary'));
hdrRow.appendChild(el('span',{style:{fontSize:'13px',color:'var(--color-text-secondary)'}},`${done}/${total} · ${pct}%`));
hdr.appendChild(hdrRow);
const barWrap=el('div',{style:{height:'5px',background:'var(--color-border-tertiary)',borderRadius:'3px'}});
const barFill=el('div',{style:{height:'5px',borderRadius:'3px',background:'#639922',width:pct+'%',transition:'width 0.4s ease'}});
barWrap.appendChild(barFill);
hdr.appendChild(barWrap);
root.appendChild(hdr);

// Tabs
const tabBar=el('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'1.25rem',paddingBottom:'12px',borderBottom:'0.5px solid var(--color-border-tertiary)'}});
PHASES.forEach(p=>{
const phItems=p.sections.flatMap(s=>s.items);
const phDone=phItems.filter(i=>state.checks[i.id]).length;
const active=state.tab===p.id;
const t=THEME[p.theme]||THEME.info;
const btn=el('button',{
style:{padding:'5px 12px',borderRadius:'var(--border-radius-md)',fontSize:'13px',cursor:'pointer',
border:active?`1px solid ${t.bar}`:'0.5px solid var(--color-border-tertiary)',
background:active?t.bg:'var(--color-background-primary)',
color:active?t.fg:'var(--color-text-secondary)',
fontWeight:active?'500':'400',display:'flex',alignItems:'center',gap:'6px'},
onClick:()=>setTab(p.id)
},p.label);
btn.appendChild(el('span',{style:{fontSize:'11px',opacity:'0.7'}},`${phDone}/${phItems.length}`));
tabBar.appendChild(btn);
});
const resActive=state.tab==='resources';
tabBar.appendChild(el('button',{
style:{padding:'5px 12px',borderRadius:'var(--border-radius-md)',fontSize:'13px',cursor:'pointer',
border:resActive?'0.5px solid var(--color-border-primary)':'0.5px solid var(--color-border-tertiary)',
background:resActive?'var(--color-background-secondary)':'var(--color-background-primary)',
color:resActive?'var(--color-text-primary)':'var(--color-text-secondary)',fontWeight:resActive?'500':'400'},
onClick:()=>setTab('resources')
},'Resources'));
root.appendChild(tabBar);

if(!state.loaded){
root.appendChild(el('p',{style:{color:'var(--color-text-tertiary)',fontSize:'14px'}},'Loading...'));
return;
}

const content=el('div',{});

if(state.tab==='resources'){
RESOURCES.forEach((r,idx)=>{
const row=el('div',{style:{display:'flex',alignItems:'flex-start',gap:'10px',padding:'10px 0',borderBottom:'0.5px solid var(--color-border-tertiary)'}});
const cb=el('input',{type:'checkbox',checked:!!state.checks[r.id],onChange:()=>toggleCheck(r.id)});
cb.style.marginTop='2px';
row.appendChild(cb);
const textWrap=el('div',{style:{flex:'1',display:'flex',justifyContent:'space-between',alignItems:'center',gap:'8px'}});
textWrap.appendChild(el('span',{style:{fontSize:'13px',color:state.checks[r.id]?'var(--color-text-tertiary)':'var(--color-text-primary)',textDecoration:state.checks[r.id]?'line-through':'none',lineHeight:'1.5'}},r.text));
if(r.url){
const a=el('a',{href:r.url,target:'_blank',rel:'noopener noreferrer',style:{flexShrink:'0'}});
a.appendChild(makeIcon('ti-external-link',13));
textWrap.appendChild(a);
}
row.appendChild(textWrap);
content.appendChild(row);
});
}else{
const activePhase=PHASES.find(p=>p.id===state.tab);
if(activePhase){
// Expand/collapse bar
const anyOpen=activePhase.sections.some(s=>state.open[s.id]);
const ctrlRow=el('div',{style:{display:'flex',justifyContent:'flex-end',marginBottom:'10px',gap:'12px'}});
const expBtn=el('button',{
style:{fontSize:'12px',color:'var(--color-text-secondary)',background:'none',border:'none',cursor:'pointer',padding:'0'},
onClick:()=>toggleAllSections(activePhase,!anyOpen)
},anyOpen?'Collapse all':'Expand all');
ctrlRow.appendChild(expBtn);
content.appendChild(ctrlRow);

activePhase.sections.forEach(section=>{
const secDone=section.items.filter(i=>state.checks[i.id]).length;
const secTotal=section.items.length;
const isOpen=!!state.open[section.id];
const allDone=secDone===secTotal;

const wrap=el('div',{style:{marginBottom:'8px',border:'0.5px solid var(--color-border-tertiary)',borderRadius:'var(--border-radius-lg)',overflow:'hidden'}});

// Section header
const hd=el('button',{
style:{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',
padding:'11px 14px',background:allDone?'var(--color-background-success)':'var(--color-background-secondary)',
border:'none',cursor:'pointer',gap:'8px'},
onClick:()=>toggleSection(section.id)
});
const hdLeft=el('div',{style:{display:'flex',alignItems:'center',gap:'8px',flex:'1',textAlign:'left'}});
if(allDone)hdLeft.appendChild(makeIcon('ti-circle-check',15));
const hdText=el('div',{});
hdText.appendChild(el('div',{style:{fontSize:'13px',fontWeight:'500',color:'var(--color-text-primary)'}},section.title));
hdText.appendChild(el('div',{style:{fontSize:'11px',color:'var(--color-text-tertiary)',marginTop:'2px'}},section.week));
hdLeft.appendChild(hdText);
hd.appendChild(hdLeft);
const hdRight=el('div',{style:{display:'flex',alignItems:'center',gap:'10px'}});
hdRight.appendChild(el('span',{style:{fontSize:'12px',color:allDone?'var(--color-text-success)':'var(--color-text-secondary)',fontWeight:allDone?'500':'400'}},`${secDone}/${secTotal}`));
hdRight.appendChild(makeIcon(isOpen?'ti-chevron-up':'ti-chevron-down',14));
hd.appendChild(hdRight);
wrap.appendChild(hd);

// Items
if(isOpen){
const itemsWrap=el('div',{style:{padding:'4px 14px 10px'}});
section.items.forEach(item=>{
const checked=!!state.checks[item.id];
const row=el('div',{style:{display:'flex',alignItems:'flex-start',gap:'10px',padding:'8px 0',borderBottom:'0.5px solid var(--color-border-tertiary)'}});
const cb=el('input',{type:'checkbox',checked:checked,onChange:()=>toggleCheck(item.id)});
row.appendChild(cb);
const right=el('div',{style:{flex:'1'}});
const top=el('div',{style:{display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap'}});
if(item.tag){
const badge=el('span',{style:{fontSize:'10px',padding:'1px 7px',borderRadius:'10px',fontWeight:'500',flexShrink:'0',background:DIFF[item.tag]?.bg||'',color:DIFF[item.tag]?.fg||''}},item.tag);
top.appendChild(badge);
}
top.appendChild(el('span',{style:{fontSize:'13px',color:checked?'var(--color-text-tertiary)':'var(--color-text-primary)',textDecoration:checked?'line-through':'none',lineHeight:'1.5'}},item.text));
if(item.url){
const a=el('a',{href:item.url,target:'_blank',rel:'noopener noreferrer',style:{flexShrink:'0'}});
a.appendChild(makeIcon('ti-external-link',12));
top.appendChild(a);
}
right.appendChild(top);
if(item.note){
const note=el('div',{style:{fontSize:'11px',color:'var(--color-text-tertiary)',marginTop:'3px',fontStyle:'italic',display:'flex',alignItems:'flex-start',gap:'4px'}});
note.appendChild(makeIcon('ti-bulb',11));
note.appendChild(document.createTextNode(item.note));
right.appendChild(note);
}
row.appendChild(right);
itemsWrap.appendChild(row);
});
wrap.appendChild(itemsWrap);
}
content.appendChild(wrap);
});
}
}
root.appendChild(content);
}

render();
loadChecks();
</script>
